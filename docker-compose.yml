services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 2s
      timeout: 2s
      retries: 15

  api:
    build: .
    environment:
      DATABASE_URL: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
