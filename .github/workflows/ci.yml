name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # Suíte completa com race detector: unidade, concorrência,
      # integração com Postgres e e2e — tudo no mesmo job.
      - name: test (unit)
        run: go test ./...
