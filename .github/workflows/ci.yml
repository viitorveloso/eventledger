name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (fast)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (unit)
        run: go test ./...

  integration:
    name: Integration & e2e (PR/manual)
    # run only for pull_request and manual dispatch, not for push to main
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
          POSTGRES_DB: ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (-race, unit + integration + e2e)
        env:
          TEST_DATABASE_URL: postgres://ledger:ledger@localhost:5432/ledger?sslmode=disable
        run: go test -race -count=1 ./...
      - name: test (unit)
        run: go test ./...
